<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – UNICYCLE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">UNI<span>CYCLE</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="sell.html">Sell Item</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="login.html" class="active">Login</a></li>
      <li><a href="signup.html" class="btn-nav">Sign Up</a></li>
    </ul>
  </nav>

  <div class="auth-bg">
    <div class="form-wrap">

      <div style="text-align:center; margin-bottom:1.75rem;">
        <a href="index.html" style="font-family:'Syne',sans-serif; font-weight:800; font-size:1.6rem; color:var(--black); text-decoration:none; letter-spacing:-0.03em;">
          UNI<span style="color:var(--grey-dark);">CYCLE</span>
        </a>
      </div>

      <h2>Welcome back</h2>
      <p class="sub">Log in to your account to buy, sell, and manage listings.</p>

      <div class="form-group">
        <label for="l-email">Email Address</label>
        <input type="email" id="l-email" placeholder="you@university.ac.ke" />
      </div>

      <div class="form-group">
        <label for="l-pass">Password</label>
        <input type="password" id="l-pass" placeholder="Enter your password" />
      </div>

      <div style="text-align:right; margin-top:-0.5rem; margin-bottom:1.5rem;">
        <a href="#" style="font-size:0.82rem; color:var(--grey-dark); text-decoration:none; font-weight:500;">Forgot password?</a>
      </div>

      <button class="btn btn-primary" style="width:100%; justify-content:center;">
        Log In →
      </button>

      <div style="display:flex; align-items:center; gap:1rem; margin:1.5rem 0;">
        <div style="flex:1; height:1px; background:var(--grey-light);"></div>
        <span style="font-size:0.8rem; color:var(--grey-mid);">or</span>
        <div style="flex:1; height:1px; background:var(--grey-light);"></div>
      </div>

      <button class="btn" style="width:100%; justify-content:center; background:var(--grey-light); color:var(--black); font-family:'DM Sans',sans-serif; font-weight:500;">
        🎓 Continue with Student Email
      </button>

      <p class="form-footer" style="margin-top:1.5rem;">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </p>
    </div>
  </div>

  <footer>
    <p>© 2025 <strong>UNICYCLE</strong> — Built for students, by students.</p>
  </footer>

</body>
</html>
